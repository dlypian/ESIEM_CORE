###############################################################
# Default Logstash log4j2.properties (unmodified defaults)
###############################################################
status = error
name = LogstashPropertiesConfig

appender.console.type = Console
appender.console.name = plain_console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{ISO8601}][%-5p][%-25c] %m%n

rootLogger.level = info
rootLogger.appenderRef.console.ref = plain_console

###############################################################
# Custom: Silence NetFlow template warnings only
###############################################################
logger.netflowcodec.name = logstash.codecs
logger.netflowcodec.level = error
