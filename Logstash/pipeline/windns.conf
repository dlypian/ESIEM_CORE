filter {
  if "windns" in [tags] {
    # Drop lines that do not start with a valid date pattern for Windows log timestamp
    if [message] !~ /^[0-9]{1,2}\/[0-9]{1,2}\/[0-9]{4}/ {
      drop { }
    }

    grok {
      match => {
        "message" => "%{MONTHNUM:month}/%{MONTHDAY:day}/%{YEAR:year} %{HOUR:hour}:%{MINUTE:minute}:%{SECOND:second} %{WORD:ampm}\s+%{WORD:thread_id}\s+%{WORD:context}\s+%{DATA:packet_id}\s+%{WORD:protocol}\s+%{WORD:send_receive}\s+%{IP:remote_ip}\s+%{DATA:xid}(?:\s+%{WORD:query_response})?\s+%{WORD:opcode}\s+\[%{DATA:flags_hex}\s+%{DATA:flags_char}\s+%{WORD:response_code}\]\s+%{WORD:question_type}\s+(?<question_name>\(%{NUMBER}\)%{NOTSPACE}(?:\(%{NUMBER}\)%{NOTSPACE})*)"
      }
    }

    # Create @timestamp using the extracted date and time fields with AM/PM
    mutate {
      add_field => {
        "timestamp" => "%{month}/%{day}/%{year} %{hour}:%{minute}:%{second} %{ampm}"
      }
    }

    # Ensure 'question_fqdn' is treated as a string and copy question_name
    mutate {
      copy => { "question_name" => "question_fqdn" }
    }

    mutate {
      gsub => [
        "question_fqdn", "\([0-9]+\)", "."  # Replace only the numeric values inside parentheses
      ]
    }

    mutate {
      gsub => [
        # Remove the leading dot
        "question_fqdn", "^.", "",
        # Remove the trailing dot
        "question_fqdn", ".$", ""
      ]
    }

    # Parse the timestamp with AM/PM
    date {
      match => ["timestamp", "MM/dd/yyyy hh:mm:ss a"]  # 'a' handles AM/PM
      target => "@timestamp"
      remove_field => ["timestamp"]  # Clean up the intermediate field
    }
  }
}
