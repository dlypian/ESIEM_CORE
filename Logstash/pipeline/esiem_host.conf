filter {
  if "ESIEM_Host" in [tags] {

    # Attempt to parse the JSON from the message field if it looks like JSON
    if [message] =~ /^\s*{/ {
      json {
        source => "message"
        target => "parsed_data"  # Store the parsed JSON in the 'parsed_data' field
        tag_on_failure => ["_jsonparsefailure"]  # Tag logs that fail JSON parsing
      }
    } else {
      # Tag non-JSON messages for further analysis
      mutate {
        add_tag => ["_non_json_log"]
      }
    }
  }
}
