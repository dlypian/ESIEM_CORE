filter {

    if "pan_syslog" in [tags] {

        # Traffic log fields: https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/monitoring/use-syslog-for-monitoring/syslog-field-descriptions/traffic-log-fields.html
        if ([message] =~ /TRAFFIC/) {
            csv {
                source => "message"
                columns => [ 
                    "FUTURE_USE", "Receive_Time", "Serial_Number", "Type", "Threat/Content_Type", "FUTURE_USE", "Generated_Time", "Source_Address", "Destination_Address", "NAT_Source_IP", "NAT_Destination_IP", "Rule_Name", "Source_User", "Destination_User", "Application", "Virtual_System", "Source_Zone", "Destination_Zone", "Inbound_Interface", "Outbound_Interface", "Log_Action", "FUTURE_USE", "Session_ID", "Repeat_Count", "Source_Port", "Destination_Port", "NAT_Source_Port", "NAT_Destination_Port", "Flags", "Protocol", "Action", "Bytes", "Bytes_Sent", "Bytes_Received", "Packets", "Start_Time", "Elapsed_Time", "Category", "FUTURE_USE", "Sequence_Number", "Action_Flags", "Source_Country", "Destination_Country", "FUTURE_USE", "Packets_Sent", "Packets_Received", "Session_End_Reason", "Device_Group_Hierarchy_Level_1", "Device_Group_Hierarchy_Level_2", "Device_Group_Hierarchy_Level_3", "Device_Group_Hierarchy_Level_4", "Virtual_System_Name", "Device_Name", "Action_Source", "Source_VM_UUID", "Destination_VM_UUID", "Tunnel_ID/IMSI", "Monitor_Tag/IMEI", "Parent_Session_ID", "Parent_Start_Time", "Tunnel_Type", "SCTP_Association_ID", "SCTP_Chunks", "SCTP_Chunks_Sent", "SCTP_Chunks_Received", "Rule_UUID", "HTTP/2_Connection", "App_Flap_Count", "Policy_ID", "Link_Switches", "SD-WAN_Cluster", "SD-WAN_Device_Type", "SD-WAN_Cluster_Type", "SD-WAN_Site", "Dynamic_User_Group_Name", "XFF_Address", "Source_Device_Category", "Source_Device_Profile", "Source_Device_Model", "Source_Device_Vendor", "Source_Device_OS_Family", "Source_Device_OS_Version", "Source_Hostname", "Source_Mac_Address", "Destination_Device_Category", "Destination_Device_Profile", "Destination_Device_Model", "Destination_Device_Vendor", "Destination_Device_OS_Family", "Destination_Device_OS_Version", "Destination_Hostname", "Destination_Mac_Address", "Container_ID", "POD_Namespace", "POD_Name", "Source_External_Dynamic_List", "Destination_External_Dynamic_List", "Host_ID", "Serial_Number", "Source_Dynamic_Address_Group", "Destination_Dynamic_Address_Group", "Session_Owner", "High_Resolution_Timestamp", "A_Slice_Service_Type", "A_Slice_Differentiator", "Application_Subcategory", "Application_Category", "Application_Technology", "Application_Risk", "Application_Characteristic", "Application_Container", "Tunneled_Application", "Application_SaaS", "Application_Sanctioned_State", "Offloaded", "Flow_Type", "Cluster_Name"
                ]   
            }   

            # Exclude private IP addresses
            if [Source_Address_geo][ip] =~ /^10\.|^172\.(1[6-9]|2\d|3[01])\.|^192\.168\./ or [Destination_Address_geo][ip] =~ /^10\.|^172\.(1[6-9]|2\d|3[01])\.|^192\.168\./ {
                drop {}
            }

            geoip {
                source => "Source_Address"
                target => "Source_Address_geo"
            }

            # Look up the Destination_Address using GeoIP and rename the field to Destination_Address_geo
            geoip {
                source => "Destination_Address"
                target => "Destination_Address_geo"
            }


            mutate {
                convert => {
                    "Bytes" => "integer"
                    "Bytes_Received" => "integer"
                    "Bytes_Sent" => "integer"
                    "Elapsed_Time" => "integer"
                    "NAT_Destination_Port" => "integer"
                    "NAT_Source_Port" => "integer"
                    "Packets" => "integer"
                    "Packets_Received" => "integer"
                    "Packets_Sent" => "integer"
                    "Sequence_Number" => "integer"
                    "Destination_Port" => "integer"
                }

                add_tag => [ "pan_traffic"]



                copy => { "Source_Address" => "Source_fqdn" }  # Copying the IP address to a new field before performing reverse lookup
                copy => { "Destination_Address" => "Destination_fqdn" }  # Copying the IP address to a new field before performing reverse lookup
                
 		        remove_field => ["FUTURE_USE", "DROP_FIELD"]
            }    

            dns {
                reverse => ["Source_fqdn", "Destination_fqdn"]  # Now we perform reverse lookup on the new field
                action => "replace"  # The action to take: replace
            }

            fingerprint {
                concatenate_sources => true
                method => "SHA1"
                key => "logstash"
                source => [ "Source_Address", "Source_Port", "Destination_Address", "Destination_Port", "Session_ID" ]
                target => "Session_FingerPrint"
            }

        }
    }
}
