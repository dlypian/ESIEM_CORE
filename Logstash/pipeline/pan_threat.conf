filter {

    if "pan_syslog" in [tags] {
        # Threat log fields: https://docs.paloaltonetworks.com/pan-os/9-0/pan-os-admin/monitoring/use-syslog-for-monitoring/syslog-field-descriptions/threat-log-fields.html
        if ([message] =~ /THREAT/) {
            csv {
                source => "message"
                columns => [ 
                    "FUTURE_USE", "Receive_Time", "Serial_Number", "Type", "Threat/Content_Type", "FUTURE_USE", "Generated_Time", "Source_Address", "Destination_Address", "NAT_Source_IP", "NAT_Destination_IP", "Rule_Name", "Source_User", "Destination_User", "Application", "Virtual_System", "Source_Zone", "Destination_Zone", "Inbound_Interface", "Outbound_Interface", "Log_Action", "FUTURE_USE", "Session_ID", "Repeat_Count", "Source_Port", "Destination_Port", "NAT_Source_Port", "NAT_Destination_Port", "Flags", "IP_Protocol", "Action", "URL/Filename", "Threat_ID", "Category", "Severity", "Direction", "Sequence_Number", "Action_Flags", "Source_Location", "Destination_Location", "FUTURE_USE", "Content_Type", "PCAP_ID", "File_Digest", "Cloud", "URL_Index", "User_Agent", "File_Type", "X-Forwarded-For", "Referer", "Sender", "Subject", "Recipient", "Report_ID", "Device_Group_Hierarchy_Level_1", "Device_Group_Hierarchy_Level_2", "Device_Group_Hierarchy_Level_3", "Device_Group_Hierarchy_Level_4", "Virtual_System_Name", "Device_Name", "FUTURE_USE", "Source_VM_UUID", "Destination_VM_UUID", "HTTP_Method", "Tunnel_ID/IMSI", "Monitor_Tag/IMEI", "Parent_Session_ID", "Parent_Start_Time", "Tunnel_Type", "Threat_Category", "Content_Version", "FUTURE_USE", "SCTP_Association_ID", "Payload_Protocol_ID", "HTTP_Headers", "URL_Category_List", "Rule_UUID", "HTTP/2_Connection", "Dynamic_User_Group_Name", "XFF_Address", "Source_Device_Category", "Source_Device_Profile", "Source_Device_Model", "Source_Device_Vendor", "Source_Device_OS_Family", "Source_Device_OS_Version", "Source_Hostname", "Source_MAC_Address", "Destination_Device_Category", "Destination_Device_Profile", "Destination_Device_Model", "Destination_Device_Vendor", "Destination_Device_OS_Family", "Destination_Device_OS_Version", "Destination_Hostname", "Destination_MAC_Address", "Container_ID", "POD_Namespace", "POD_Name", "Source_External_Dynamic_List", "Destination_External_Dynamic_List", "Host_ID", "Serial_Number", "Domain_EDL", "Source_Dynamic_Address_Group", "Destination_Dynamic_Address_Group", "Partial_Hash", "High_Resolution_Timestamp", "Reason", "Justification", "A_Slice_Service_Type", "Application_Subcategory", "Application_Category", "Application_Technology", "Application_Risk", "Application_Characteristic", "Application_Container", "Tunneled_Application", "Application_SaaS", "Application_Sanctioned_State", "Cloud Report ID", "Cluster Name", "Flow Type"
                ]   
            }   

            
            # Exclude private IP addresses
            if [Source_Address_geo][ip] =~ /^10\.|^172\.(1[6-9]|2\d|3[01])\.|^192\.168\./ or [Destination_Address_geo][ip] =~ /^10\.|^172\.(1[6-9]|2\d|3[01])\.|^192\.168\./ {
                drop {}
            }
        

            geoip {
                source => "Source_Address"
                target => "Source_Address_geo"
            }

            # Look up the Destination_Address using GeoIP and rename the field to Destination_Address_geo
            geoip {
                source => "Destination_Address"
                target => "Destination_Address_geo"
            }

            mutate {
                convert => {
                    "NAT_Destination_Port" => "integer"
                    "NAT_Source_Port" => "integer"
                    "Sequence_Number" => "integer"
                    "Destination_Port" => "integer"
                }

                add_tag => ["pan_threat"]

                copy => { "Source_Address" => "Source_fqdn" }  # Copying the IP address to a new field before performing reverse lookup
                copy => { "Destination_Address" => "Destination_fqdn" }  # Copying the IP address to a new field before performing reverse lookup

                remove_field => ["FUTURE_USE", "DROP_FIELD"]

            }   
            
            dns {
                reverse => ["Source_fqdn", "Destination_fqdn"]  # Now we perform reverse lookup on the new field
                action => "replace"  # The action to take: replace
            }

            fingerprint {
                concatenate_sources => true
                method => "SHA1"
                key => "logstash"
                source => [ "Source_Address", "Source_Port", "Destination_Address", "Destination_Port", "Session_ID" ]
                target => "Session_FingerPrint"
            }


        }   

    }
}