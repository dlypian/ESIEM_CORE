filter {
  if "windhcp" in [tags] {
    # Drop lines that do not start with a number followed by a comma
    if [message] !~ /^[0-9]+,/ {
      drop { }
    }

    # Parse the DHCP logs using CSV filter
    csv {
      source => "message"
      columns => [ 
        "id", "date", "time", "description", "ip_address", "host_name", "mac_address", 
        "user_name", "transaction_id", "qresult", "probation_time", "correlation_id", 
        "dhcid", "vendor_class_hex", "vendor_class_ascii", "user_class_hex", 
        "user_class_ascii", "relay_agent_information", "dns_reg_error"
      ]
    }

    # Translate the event 'id' field into a human-readable meaning
    translate {
      field => "id"
      dictionary => {
        "00" => "The log was started."
        "01" => "The log was stopped."
        "02" => "The log was temporarily paused due to low disk space."
        "10" => "A new IP address was leased to a client."
        "11" => "A lease was renewed by a client."
        "12" => "A lease was released by a client."
        "13" => "An IP address was found to be in use on the network."
        "14" => "A lease request could not be satisfied because the scope's address pool was exhausted."
        "15" => "A lease was denied."
        "16" => "A lease was deleted."
        "17" => "A lease was expired and DNS records for an expired leases have not been deleted."
        "18" => "A lease was expired and DNS records were deleted."
        "20" => "A BOOTP address was leased to a client."
        "21" => "A dynamic BOOTP address was leased to a client."
        "22" => "A BOOTP request could not be satisfied because the scope's address pool for BOOTP was exhausted."
        "23" => "A BOOTP IP address was deleted after checking to see it was not in use."
        "24" => "IP address cleanup operation has began."
        "25" => "IP address cleanup statistics."
        "30" => "DNS update request to the named DNS server."
        "31" => "DNS update failed."
        "32" => "DNS update successful."
        "33" => "Packet dropped due to NAP policy."
        "34" => "DNS update request failed as the DNS update request queue limit exceeded."
        "35" => "DNS update request failed."
        "36" => "Packet dropped because the server is in failover standby role or the hash of the client ID does not match."
        "50+" => "Codes above 50 are used for Rogue Server Detection information."
      }
      destination => "event_id_meaning"
      fallback => "Unknown Event ID"
    }
    
    # Convert timestamps into @timestamp
    date {
      match => [ "timestamp", "MM/dd/yy HH:mm:ss" ]
      target => "@timestamp"
    }
  }
}
