output {

    if "pan_traffic" in [tags] {
        elasticsearch {
            index => "pan_traffic"
            hosts => ["https://es01.${CLIENT_DOMAIN}:9200"]
            ssl_certificate_verification => false
            ilm_rollover_alias => "pan_traffic"
            ilm_pattern => "000001"
            ilm_policy => ES_ILM_pan_traffic
            user => "elastic"
            password => "${ELASTIC_PASSWORD}"
        }
    }

    else if "pan_threat" in [tags] {
