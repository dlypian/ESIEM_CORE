            password => "${ELASTIC_PASSWORD}"
        }
   }    
    else if "windns" in [tags] {
        elasticsearch {
            index => "windns"
            hosts => ["https://es01.${CLIENT_DOMAIN}:9200"]
            ssl_certificate_verification => false
            template => "/usr/share/logstash/templates/windns-template.json"
            template_name => "windns-template"
            template_overwrite => true
            ilm_rollover_alias => "windns"
            ilm_pattern => "000001"
            ilm_policy => ES_ILM_windns
            user => "elastic"
            password => "${ELASTIC_PASSWORD}"
        }
   }
    else if "winnps" in [tags] {
