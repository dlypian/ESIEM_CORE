        }
    }                 
    else if "netflow" in [tags] {
        elasticsearch {
            index => "netflow"
            hosts => ["https://es01.${CLIENT_DOMAIN}:9200"]
            ssl_certificate_verification => false
            ilm_rollover_alias => "netflow"
            ilm_pattern => "000001"
            ilm_policy => ES_ILM_netflows
            user => "elastic"
            password => "${ELASTIC_PASSWORD}"
        }
    }     
    else if "ESIEM_Host" in [tags] {
        elasticsearch {
            index => "esiem_host-%{+YYYY.MM.dd}"  # Optional ILM rollover alias
            hosts => ["https://es01.${CLIENT_DOMAIN}:9200"]
            ssl_certificate_verification => false
            ilm_rollover_alias => "esiem_host"
            ilm_pattern => "000001"
            ilm_policy => "ES_ILM_ESIEM_Host"
            user => "elastic"
            password => "${ELASTIC_PASSWORD}"
        }
    }            
    else {
        # Default output if no tags match (Optional)
        elasticsearch {
        index => "default-logs-%{+YYYY.MM.dd}"
        hosts => ["https://es01.${CLIENT_DOMAIN}:9200"]
        ecs_compatibility => "v1"
        ssl_certificate_verification => false
        ilm_policy => "ES_ILM_Default"        
        user => "elastic"
        password => "${ELASTIC_PASSWORD}"
        }
    }       
}