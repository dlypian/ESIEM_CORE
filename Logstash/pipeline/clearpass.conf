filter {
  if [type] == "clearpass" {
    # Updated grok pattern to match your log structure
    grok {
      match => { "message" => "^EventTracker_%{NOTSPACE:event_tracker} %{NUMBER:event_id} %{NUMBER:event_code} %{NUMBER:event_status} %{GREEDYDATA:kv_data}$" }
      tag_on_failure => ["_grokparsefailure"]
    }

    # If grok parsing was successful, parse the key-value pairs
    if "_grokparsefailure" not in [tags] {
      kv {
        source => "kv_data"         # The field containing the key-value pairs
        field_split => ","          # Split fields by comma
        value_split => "="          # Split key-value pairs by equals sign
        # remove_field => ["message", "event_tracker", "event_id", "event_code", "event_status"]
      }
    }
    # If grok parsing fails, the log is sent as-is
  }
}
